<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladder Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background: linear-gradient(180deg,#08111f,#0f172a);
  color: #e2e8f0;
  font-family: system-ui;
}
.card {
  background: rgba(15,23,42,.7);
  border: 1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(10px);
}
</style>
</head>

<body class="p-4 max-w-3xl mx-auto">

<h1 class="text-2xl font-bold mb-4">Ladder Tracker</h1>

<div class="card p-4 rounded-xl space-y-4">

  <input id="runName" value="Road to 1K" class="w-full p-3 rounded bg-slate-900"/>

  <div class="grid grid-cols-2 gap-3">
    <input id="startingBankroll" value="10" type="number" class="p-3 rounded bg-slate-900"/>
    <input id="targetBankroll" value="1000" type="number" class="p-3 rounded bg-slate-900"/>
  </div>

  <input id="betStake" placeholder="Stake" type="number" class="w-full p-3 rounded bg-slate-900"/>

  <!-- FIXED ODDS INPUT -->
  <input id="betOdds" type="text" placeholder="-235 or +150" class="w-full p-3 rounded bg-slate-900"/>

  <input id="betNote" placeholder="Bet Name / ID (Required)" class="w-full p-3 rounded bg-slate-900"/>

  <button id="lockBtn" class="w-full p-3 bg-blue-500 rounded font-bold">
    Lock Next Play
  </button>

</div>

<div class="mt-4 flex gap-2 flex-wrap">
  <button id="exportRunBtn" class="p-3 bg-slate-800 rounded">Export</button>

  <label class="p-3 bg-slate-800 rounded cursor-pointer">
    Import
    <input id="importRunInput" type="file" class="hidden"/>
  </label>

  <button id="downloadPngBtn" class="p-3 bg-green-500 rounded">PNG</button>
</div>

<div id="log" class="mt-6 space-y-2"></div>

<script>

const els = {
  betOdds: document.getElementById('betOdds'),
  betStake: document.getElementById('betStake'),
  betNote: document.getElementById('betNote'),
  runName: document.getElementById('runName'),
  startingBankroll: document.getElementById('startingBankroll'),
  targetBankroll: document.getElementById('targetBankroll'),
  log: document.getElementById('log'),
  exportRunBtn: document.getElementById('exportRunBtn'),
  importRunInput: document.getElementById('importRunInput'),
  downloadPngBtn: document.getElementById('downloadPngBtn')
};

let bets = [];

/* ===========================
   PARSE ODDS
=========================== */
function parseOdds(v){
  v = v.trim();
  if(!/^[+-]?\d+$/.test(v)) return null;
  return Number(v);
}

/* ===========================
   MOBILE INPUT FIX
=========================== */
els.betOdds.addEventListener('input', (e) => {
  let v = e.target.value;

  // Remove spaces
  v = v.replace(/\s+/g, '');

  // Remove invalid characters
  v = v.replace(/[^0-9+-]/g, '');

  // Only allow ONE leading + or -
  if (v.length > 1) {
    v = v[0] + v.slice(1).replace(/[+-]/g, '');
  }

  // Ensure sign only at start
  if (/^[0-9]/.test(v)) {
    v = v.replace(/[+-]/g, '');
  }

  e.target.value = v;
});

/* ===========================
   LOCK PLAY
=========================== */
document.getElementById('lockBtn').onclick = () => {

  const stake = Number(els.betStake.value);
  const odds = parseOdds(els.betOdds.value);
  const note = els.betNote.value.trim();

  if(!note){
    alert("Bet name required");
    return;
  }

  if(!stake || !odds){
    alert("Invalid stake or odds");
    return;
  }

  const profit = odds > 0
    ? stake * (odds/100)
    : stake * (100/Math.abs(odds));

  bets.push({
    stake,
    odds,
    note,
    profit
  });

  render();
};

/* ===========================
   RENDER
=========================== */
function render(){
  els.log.innerHTML = "";

  bets.forEach((b,i)=>{
    const div = document.createElement('div');
    div.className = "card p-3 rounded";

    div.innerHTML = `
      <div class="font-bold">Leg ${i+1}</div>
      <div>${b.note}</div>
      <div>$${b.stake} @ ${b.odds}</div>
      <div class="text-green-400">+$${b.profit.toFixed(2)}</div>
    `;

    els.log.appendChild(div);
  });
}

/* ===========================
   EXPORT JSON
=========================== */
els.exportRunBtn.onclick = () => {
  const blob = new Blob([JSON.stringify(bets,null,2)]);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "ladder-run.json";
  a.click();
};

/* ===========================
   IMPORT JSON
=========================== */
els.importRunInput.onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const text = await file.text();

  try{
    bets = JSON.parse(text);
    render();
  } catch {
    alert("Invalid file");
  }
};

/* ===========================
   PNG EXPORT
=========================== */
els.downloadPngBtn.onclick = async () => {
  const canvas = await html2canvas(document.body);
  const a = document.createElement('a');
  a.href = canvas.toDataURL();
  a.download = "ladder.png";
  a.click();
};

</script>

</body>
</html>
