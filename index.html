<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ladder Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .bg-app {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(168,85,247,0.16), transparent 30%),
        linear-gradient(180deg, #08111f 0%, #0f172a 42%, #111827 100%);
    }
    .glass {
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }
    .glass-soft {
      background: rgba(15, 23, 42, 0.56);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }
    .text-glow {
      text-shadow: 0 0 24px rgba(96, 165, 250, 0.18);
    }
    .share-gradient {
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.28), transparent 32%),
        radial-gradient(circle at top right, rgba(192,132,252,0.28), transparent 36%),
        linear-gradient(180deg, #0b1220 0%, #101827 100%);
    }
    .pill-win { background: rgba(34,197,94,0.14); color: #86efac; border-color: rgba(34,197,94,0.25); }
    .pill-loss { background: rgba(239,68,68,0.14); color: #fca5a5; border-color: rgba(239,68,68,0.25); }
    .pill-cash { background: rgba(245,158,11,0.14); color: #fcd34d; border-color: rgba(245,158,11,0.25); }
    .odds-positive { color: #86efac; }
    .odds-negative { color: #fca5a5; }
  </style>
</head>
<body class="bg-app min-h-screen text-slate-100">
  <div class="max-w-7xl mx-auto p-3 md:p-5 lg:p-8 grid grid-cols-1 xl:grid-cols-[1.08fr_0.92fr] gap-4">
    <div class="glass rounded-[28px] overflow-hidden">
      <div class="p-4 md:p-6 border-b border-white/10">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-sky-400/20 bg-sky-400/10 text-sky-200 text-[11px] uppercase tracking-[0.25em]">Ladder Mode</div>
            <h1 class="text-2xl md:text-4xl font-bold mt-3 text-glow">Ladder Tracker</h1>
            <p class="text-sm md:text-base text-slate-300 mt-2 max-w-2xl">Lock a play, grade the result, then move to the next leg.</p>
          </div>
          <button id="toggleUtilitiesBtn" class="shrink-0 h-10 px-3 rounded-2xl border border-white/15 bg-white/5 hover:bg-white/10 text-sm font-medium xl:hidden">
            Tools
          </button>
        </div>
      </div>

      <div class="p-3 md:p-5 space-y-4">
        <!-- Top Banner -->
        <div class="rounded-[22px] border border-white/10 bg-white/5 px-3 py-3">
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-0">
            <div class="px-1 lg:px-4 lg:border-r lg:border-white
